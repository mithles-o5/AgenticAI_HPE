# Universal Resource Resolver — Endpoint Routing templates
# Decouples relative REST path specifications from python files.
routing_rules:
  oneview:
    server: "/rest/server-hardware/{uuid}"
    switch: "/rest/switches/{uuid}"
    router: "/rest/routers/{uuid}"
    firewall: "/rest/firewalls/{uuid}"
    storage: "/rest/storage-systems/{uuid}"
    default: "/rest/devices/{uuid}"
  coms:
    server: "/compute-ops-mgmt/v1/servers/{uuid}"
    switch: "/compute-ops-mgmt/v1/switches/{uuid}"
    router: "/compute-ops-mgmt/v1/routers/{uuid}"
    firewall: "/compute-ops-mgmt/v1/firewalls/{uuid}"
    storage: "/compute-ops-mgmt/v1/storage-systems/{uuid}"
    default: "/compute-ops-mgmt/v1/devices/{uuid}"
  cloud:
    vm: "/cloud-agent/execute-task"
    container: "/cloud-agent/execute-task"
    function: "/cloud-agent/execute-task"
    default: "/cloud-agent/execute-task"
  network:
    switch: "/network-agent/execute-task"
    router: "/network-agent/execute-task"
    interface: "/network-agent/execute-task"
    default: "/network-agent/execute-task"
  storage:
    volume: "/storage-agent/execute-task"
    array: "/storage-agent/execute-task"
    pool: "/storage-agent/execute-task"
    bucket: "/storage-agent/execute-task"
    default: "/storage-agent/execute-task"
